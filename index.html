<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dementia Clinical Assistant</title>

<style>
body {
  font-family: system-ui, sans-serif;
  background: #ffffff;
  color: #1a1a1a;
}

.app {
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

h1 {
  font-size: 24px;
  margin-bottom: 4px;
}

.sub {
  color: #666;
  font-size: 13px;
  margin-bottom: 20px;
}

.card {
  background: #fff;
  border-radius: 10px;
  padding: 1.2rem;
  margin-bottom: 1rem;
  border: 1px solid #eee;
}

.section-title {
  font-size: 12px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.field {
  margin-bottom: 12px;
}

label {
  font-size: 13px;
  color: #555;
  display: block;
  margin-bottom: 4px;
}

input, select, textarea {
  width: 100%;
  padding: 7px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  background: #111;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.result {
  padding: 1rem;
  border-radius: 10px;
  margin-top: 1rem;
}

.high { background: #fef2f2; }
.mid { background: #fffbeb; }
.low { background: #f0fdf4; }

.metric {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin: 4px 0;
}

.ai {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.6;
}
</style>
</head>

<body>
<div class="app">

<h1>Clinical Dementia Assessment Tool</h1>
<div class="sub">Decision support system for early cognitive impairment screening</div>

<div class="card">
<div class="section-title">Patient Info</div>

<div class="field">
<label>Age</label>
<input type="number" id="age" value="72">
</div>

<div class="field">
<label>Memory complaints</label>
<select id="memory">
<option value="none">None</option>
<option value="mild">Mild</option>
<option value="moderate">Moderate</option>
<option value="severe">Severe</option>
</select>
</div>

<div class="field">
<label>Clinical Notes</label>
<textarea id="notes"></textarea>
</div>
</div>

<div class="card">
<div class="section-title">Speech & Cognitive Indicators</div>

<div class="field">
<label>Word Finding</label>
<select id="word">
<option value="1">None</option>
<option value="4">Mild</option>
<option value="7">Moderate</option>
<option value="10">Severe</option>
</select>
</div>

<div class="field">
<label>Sentence Coherence</label>
<select id="coherence">
<option value="10">Normal</option>
<option value="6">Mild impairment</option>
<option value="4">Moderate impairment</option>
<option value="1">Severe impairment</option>
</select>
</div>

<div class="field">
<label>Repetition</label>
<select id="repeat">
<option value="1">None</option>
<option value="4">Mild</option>
<option value="7">Moderate</option>
<option value="10">Frequent</option>
</select>
</div>

<div class="field">
<label>Hesitation</label>
<select id="hesitation">
<option value="1">Normal</option>
<option value="4">Mild</option>
<option value="7">Moderate</option>
<option value="10">Severe</option>
</select>
</div>

</div>

<button onclick="analyze()">Analyze Patient</button>

<div id="output"></div>

</div>

<script>
async function analyze() {

const age = parseInt(age.value);
const memory = memory.value;
const notes = notes.value;
const word = parseInt(document.getElementById('word').value);
const coherence = parseInt(document.getElementById('coherence').value);
const repeat = parseInt(document.getElementById('repeat').value);
const hesitation = parseInt(document.getElementById('hesitation').value);

let risk = 0;

if (word >= 7) risk += 25;
if (coherence <= 4) risk += 25;
if (repeat >= 7) risk += 20;
if (hesitation >= 7) risk += 15;
if (age >= 70) risk += 10;
if (memory === "severe") risk += 15;

let level = risk > 60 ? "high" : risk > 30 ? "mid" : "low";

let primary = "None";
if (word >= 7) primary = "Language impairment";
else if (coherence <= 4) primary = "Disorganized speech";

let confidence = risk > 60 ? "High" : risk > 30 ? "Moderate" : "Low";

document.getElementById("output").innerHTML = `
<div class="card result ${level}">
<b>Clinical Risk Score:</b> ${risk}%<br>
<b>Risk Level:</b> ${level.toUpperCase()}<br>
<b>Primary Concern:</b> ${primary}<br>
<b>Confidence:</b> ${confidence}
</div>

<div class="card">
<div class="section-title">AI Clinical Assessment</div>
<div class="ai" id="ai">Loading...</div>
</div>
`;

const prompt = `
Provide a structured clinical assessment.

Summary:
Clinical Interpretation:
Next Steps:
Limitations:

Patient age: ${age}
Risk score: ${risk}
`;

const res = await fetch('/api/chat', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({
messages:[{role:'user', content: prompt}]
})
});

const data = await res.json();
document.getElementById("ai").textContent =
data?.choices?.[0]?.message?.content || "Error";
}
</script>
</body>
</html>
